<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valletta City Suites - Roof Terrace 360</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    html, body { margin: 0; height: 100%; font-family: Arial, sans-serif; background: #111; }
    #panorama { width: 100%; height: 100vh; }
    .title {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1.3;
    }
    .hint { font-size: 13px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="title">
    Valletta City Suites<br>
    <span class="hint">Roof Terrace 360° — drag to look around</span>
  </div>
  <div id="panorama"></div>
  <script>
    pannellum.viewer('panorama', {
      type: 'equirectangular',
      panorama: 'roof-terrace.jpg',
      autoLoad: true,
      compass: false,
      showControls: true,
      hfov: 100,
      pitch: 0,
      yaw: 0
    });
  </script>
</body>
</html>
